name: Build and Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Prepare MinIO update files
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MINIO_DOWNLOAD_BASE_URL: https://miniapi.o3.yaozc.ccwu.cc/files
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          gradle = Path("app/build.gradle").read_text(encoding="utf-8")
          match = re.search(r'^\s*versionName\s+"([^"]+)"', gradle, re.MULTILINE)
          if not match:
              raise SystemExit("Could not read versionName from app/build.gradle")
          if version != match.group(1):
              raise SystemExit(f"Tag v{version} does not match versionName {match.group(1)}")

          apk_path = Path("app/build/outputs/apk/release/app-release.apk")
          apk_key = f"yaozechuan/xiaomai-v{version}.apk"
          apk_url = f"{os.environ['MINIO_DOWNLOAD_BASE_URL'].rstrip('/')}/{apk_key}"
          manifest = {
              "version": version,
              "apkUrl": apk_url,
              "sha256": hashlib.sha256(apk_path.read_bytes()).hexdigest(),
          }
          Path("version.json").write_text(json.dumps(manifest), encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"MINIO_APK_KEY={apk_key}\n")
              env_file.write("MINIO_MANIFEST_KEY=yaozechuan/version.json\n")
          PY

      - name: Upload APK and manifest to MinIO
        if: startsWith(github.ref, 'refs/tags/')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
          MINIO_ENDPOINT: https://miniapi.o3.yaozc.ccwu.cc
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::Missing MINIO_ACCESS_KEY or MINIO_SECRET_KEY GitHub Actions secret."
            exit 1
          fi
          aws configure set default.s3.addressing_style path
          aws configure set default.s3.max_concurrent_requests 10
          aws s3 cp app/build/outputs/apk/release/app-release.apk "s3://files/${MINIO_APK_KEY}" \
            --endpoint-url "$MINIO_ENDPOINT" --no-progress
          aws s3 cp version.json "s3://files/${MINIO_MANIFEST_KEY}" \
            --endpoint-url "$MINIO_ENDPOINT" --no-progress

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi-assistant-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
